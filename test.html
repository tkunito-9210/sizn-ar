<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIZN V2 3D Box Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; z-index: 10; }
    </style>
</head>
<body>

    <div id="info">
        <strong>SIZN V2 - 3D Box Preview</strong><br>
        Geminiの2D座標から3D立体を自動生成<br>
        <span id="dimensions">データ受信中...</span>
    </div>

    <script>
let geminiJson = null; 
let scene, camera, renderer, box, gridHelper;

// 🌟 ページ読み込み完了時、URLからデータを自動抽出するロジック
window.addEventListener('DOMContentLoaded', () => {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('geminiData');

        if (!rawData) {
            document.getElementById('dimensions').innerHTML = '<span style="color:red;">エラー: URLにデータが含まれていません</span>';
            return;
        }

        // URLエンコードされた文字列をデコードしてJSONオブジェクトに戻す
        geminiJson = JSON.parse(decodeURIComponent(rawData));
        console.log("URLから無事にデータを取得しました:", geminiJson);

        // 3Dサイズ計算と描画を開始
        startCalculation(geminiJson);

      } catch (error) {
          console.error("URLデータの解析に失敗しました:", error);
          document.getElementById('dimensions').innerHTML = `<span style="color:red;">パースエラー: ${error.message}</span>`;
      }
});

function startCalculation(data) {
    try {
        const front = data.image1_front_location;
        const side = data.image2_side_location;

        if (!front || !side) {
            throw new Error("フロントまたはサイドの座標データが不足しています");
        }

        const width = (front.xmax - front.xmin) / 1000;   
        const height = (front.ymax - front.ymin) / 1000;  
        const depth = (side.xmax - side.xmin) / 1000;    

        document.getElementById('dimensions').innerHTML = `
            対象: ${data.target_name || "未特定"}<br>
            W: ${width.toFixed(2)} / H: ${height.toFixed(2)} / D: ${depth.toFixed(2)}
        `;

        // Three.js 初期化
        initThreeJs(width, height, depth);

        // 1秒後に数値をFlutterFlowへ送り返す（画面遷移トリガー）
        setTimeout(() => {
            const resultData = {
                "width": Math.round(width * 1000),
                "height": Math.round(height * 1000),
                "depth": Math.round(depth * 1000)
            };
            
            if (window.ARWebViewChannel && window.ARWebViewChannel.postMessage) {
                window.ARWebViewChannel.postMessage(JSON.stringify(resultData));
            }
        }, 1000);

    } catch (error) {
        document.getElementById('dimensions').innerHTML = `<span style="color:red;">エラー: ${error.message}</span>`;
    }
}

function initThreeJs(width, height, depth) {
    if (renderer) { document.body.removeChild(renderer.domElement); }

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(width, height, depth);
    const material = new THREE.MeshBasicMaterial({ 
        color: 0x00ff00, 
        wireframe: true,
        transparent: true,
        opacity: 0.8
    });
    box = new THREE.Mesh(geometry, material);
    scene.add(box);

    gridHelper = new THREE.GridHelper(2, 20, 0x444444, 0x222222);
    gridHelper.position.y = -(height / 2); 
    scene.add(gridHelper);

    camera.position.z = 1.5;
    camera.position.y = 0.5;
    camera.lookAt(0, 0, 0);

    animate();
}

function animate() {
    if (!renderer) return;
    requestAnimationFrame(animate);
    if (box) box.rotation.y += 0.01;
    if (gridHelper) gridHelper.rotation.y += 0.01;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    if (!camera || !renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
    </script>
</body>
</html>
