<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIZN V2 DEBUG MODE</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        button { background: #00ff00; color: black; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 20px; cursor: pointer; }
        .box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 14px; word-break: break-all; }
    </style>
</head>
<body>

    <h2>🛠️ SIZN V2 デバッグ画面</h2>
    <div>ステータス: <span id="status" style="color: yellow;">データ受信待ち...</span></div>
    
    <button onclick="checkWindowData()">🔥 【手動】window内のデータを確認する</button>

    <div class="box">
        <strong>【デバッグ情報】</strong><br>
        <span id="debug-info">アプリ起動完了。サイン送信中...</span>
    </div>

    <script>
        // 🌟 ページが開いた瞬間、FlutterFlowに準備完了を送る
        window.addEventListener('load', () => {
            document.getElementById('debug-info').innerText = "loadイベント発火：readyサインを送信します...";
            if (window.ARWebViewChannel && window.ARWebViewChannel.postMessage) {
                window.ARWebViewChannel.postMessage(JSON.stringify({ "status": "ready" }));
                document.getElementById('debug-info').innerText += "\n➔ readyサインを送信しました！";
            } else {
                document.getElementById('debug-info').innerText += "\n❌ 警告: window.ARWebViewChannel が見つかりません。FlutterFlowのWebViewとして認識されていない可能性があります。";
            }
        });

        // 🌟 Dart側から呼び出される本番用の関数
        function startCalculation(newData) {
            document.getElementById('status').innerText = "🎉 受信成功！";
            document.getElementById('status').style.color = "#00ff00";
            document.getElementById('debug-info').innerText = "届いたデータ:\n" + JSON.stringify(newData, null, 2);
        }

        // 🔥 ボタンを押した時に、強引に中身をチェックするデバッグ関数
        function checkWindowData() {
            if (window.geminiJson) {
                document.getElementById('status').innerText = "🎉 手動確認：window内にデータを発見！";
                document.getElementById('status').style.color = "#00ff00";
                document.getElementById('debug-info').innerText = "window.geminiJsonの中身:\n" + JSON.stringify(window.geminiJson, null, 2);
            } else {
                alert("❌ まだ window.geminiJson には何も入っていません。Dartからの注入自体がブロックされている可能性が高いです。");
            }
        }
    </script>
</body>
</html>
